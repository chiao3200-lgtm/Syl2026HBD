<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recollection: 掌控之中</title>
    <style>
        :root { --qin-red: #ff3333; --bg-dark: #050505; --glass: rgba(0, 0, 0, 0.8); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); color: #fff; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
        
        /* --- 背景場景控制 --- */
        #scene-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            background-size: contain; /* 電腦版預設顯示全圖 */
            background-repeat: no-repeat; 
            background-position: center; 
            background-color: #000; 
            transition: background-image 1s ease-in-out; 
            cursor: pointer; 
        }
        
        #scene-container::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.9) 100%); pointer-events: none; }

        /* --- 對話框優化：電腦版 --- */
        .dialogue-wrapper { 
            position: absolute; 
            bottom: 6%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 1000px; 
            z-index: 100; 
        }

        .dialogue-box { 
            background: linear-gradient(180deg, rgba(10, 5, 5, 0.85) 0%, rgba(0, 0, 0, 0.95) 100%); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid var(--border); 
            border-left: 6px solid var(--qin-red); 
            padding: 35px 50px; 
            min-height: 150px; 
            position: relative; 
            border-radius: 4px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .name-tag { position: absolute; top: -16px; left: 25px; background: var(--qin-red); color: white; padding: 2px 20px; font-weight: bold; letter-spacing: 3px; font-size: 0.9rem; box-shadow: 3px 3px 0px #000; }
        
        .text-content { 
            font-size: 1.25rem; 
            line-height: 1.8; 
            letter-spacing: 1.5px; 
            color: #eeeeee; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .box-controls { position: absolute; top: 10px; right: 15px; display: flex; gap: 10px; }
        .ctrl-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #aaa; font-size: 0.75rem; padding: 4px 12px; cursor: pointer; transition: 0.3s; }
        .ctrl-btn:hover { background: var(--qin-red); color: white; }
        .click-hint { position: absolute; bottom: 15px; right: 20px; font-size: 0.75rem; color: var(--qin-red); opacity: 0.8; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 35px; border-top: 3px solid var(--qin-red); text-align: center; width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .m-btn { flex: 1; padding: 12px; cursor: pointer; font-weight: bold; border: 1px solid #444; background: transparent; color: #fff; text-decoration: none; display: inline-block; }
        .m-btn.confirm { background: var(--qin-red); border-color: var(--qin-red); }
        .credits-list { text-align: left; margin: 25px 0; }
        .credits-item { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .credits-label { color: var(--qin-red); font-size: 0.7rem; font-weight: bold; display: block; letter-spacing: 2px; text-transform: uppercase; }
        .credits-name { color: #fff; font-size: 0.95rem; display: flex; flex-direction: column; gap: 4px; }
        .social-link { color: #70a1ff; text-decoration: none; font-size: 0.85rem; }
        
        #history-menu { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: rgba(10, 5, 5, 0.98); z-index: 500; padding: 60px 30px; transition: 0.4s; border-left: 1px solid var(--qin-red); }
        #history-menu.active { right: 0; }
        .menu-item { padding: 18px 10px; border-bottom: 1px solid #222; cursor: pointer; color: #777; font-size: 0.9rem; }

        /* --- 手機版適配：消除黑邊並調整對話框 --- */
        @media (max-width: 600px) { 
            #scene-container {
                background-size: cover; /* 手機版填滿螢幕，消除黑邊 */
            }
            .dialogue-wrapper { width: 94%; bottom: 20px; }
            .dialogue-box { padding: 25px 20px; min-height: 120px; } 
            .text-content { font-size: 1.05rem; } 
            .box-controls { top: -45px; right: 0; } 
        }
    </style>
</head>
<body>
    <div id="exit-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top:0;">結束回顧</h3>
            <p style="color: #888; font-size: 0.85rem;">確定要回到博弈現場嗎？</p>
            <div class="modal-btns" style="display:flex; gap:15px; margin-top:30px;">
                <button class="m-btn" onclick="toggleExit(false)">取消</button>
                <button class="m-btn confirm" onclick="location.href='game.html'">確定</button>
            </div>
        </div>
    </div>
    <div id="credits-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="letter-spacing: 5px; color: var(--qin-red); margin-top:0;">STAFF</h3>
            <div class="credits-list">
                <div class="credits-item">
                    <span class="credits-label">繪者 Artist</span>
                    <div class="credits-name"><span>TsangFei蒼斐</span><a href="https://x.com/TsangFeiLAD" target="_blank" class="social-link">@TsangFeiLAD</a></div>
                </div>
                <div class="credits-item">
                    <span class="credits-label">網頁設計 Web Design</span>
                    <div class="credits-name"><span>蒼斐</span><a href="https://x.com/TsangFeiLAD" target="_blank" class="social-link">@TsangFeiLAD</a></div>
                </div>
                <div class="credits-item">
                    <span class="credits-label">生成軟體 Software</span>
                    <span class="credits-name" style="font-size: 0.85rem; color: #888;">Google AI studio</span>
                </div>
            </div>
            <button class="m-btn confirm" style="width:100%;" onclick="closeCredits()">結束回顧</button>
        </div>
    </div>

    <div id="scene-container" onclick="nextBeat()">
        <div class="dialogue-wrapper">
            <div class="dialogue-box">
                <div class="name-tag">秦徹</div>
                <div class="box-controls" onclick="event.stopPropagation()">
                    <button class="ctrl-btn" onclick="toggleMenu(true)">選單</button>
                    <button class="ctrl-btn" onclick="toggleExit(true)">離開</button>
                </div>
                <div class="text-content" id="dialogue-text">...</div>
                <div class="click-hint">TAP TO CONTINUE ▶</div>
            </div>
        </div>
    </div>

    <div id="history-menu">
        <h2 style="color:var(--qin-red); font-size: 1.2rem; margin-bottom:30px;">LOST RECORD</h2>
        <div id="menu-list"></div>
        <button onclick="location.href='game.html'" style="margin-top:20px; background:rgba(255,255,255,0.05); border:1px solid var(--qin-red); color:var(--qin-red); cursor:pointer; width:100%; padding:10px; font-weight:bold;">RETURN TO DUEL</button>
        <button onclick="toggleMenu(false)" style="margin-top:10px; background:none; border:1px solid #444; color:#666; cursor:pointer; width:100%; padding:10px; font-size: 0.7rem;">CLOSE MENU</button>
    </div>

    <script>
        // 保持原有的腳本邏輯不變
        const playerName = localStorage.getItem('qin_player_name') || "小狸花";
        const ENDING_IMAGE = "assets/End/lose_scene.webp"; 

        const storyBeat = [
            { text: "遊戲結束。願賭服輸，妳沒忘記剛才加碼的條件吧？" },
            { text: "從現在開始，不准說話——只能用『喵』來代替。" },
            { text: "怎麼，想反悔？剛才是誰信誓旦旦說不會輸的？" },
            { text: "來，試一次。不說出聲的話，這場懲罰就要加倍。" },
            { text: "......呵。聽起來比平時乖多了。" },
            { text: `我的 ${playerName}，期待妳今晚的『喵言喵語』。` }
        ];

        let curIdx = 0;
        const scene = document.getElementById('scene-container');
        const textEl = document.getElementById('dialogue-text');
        const menuList = document.getElementById('menu-list');

        function initStory() {
            scene.style.backgroundImage = `url('${ENDING_IMAGE}')`;
            updateDialogue();
            storyBeat.forEach((beat, i) => {
                const item = document.createElement('div');
                item.className = 'menu-item'; 
                item.innerText = `Moment ${(i+1).toString().padStart(2, '0')}`;
                item.onclick = (e) => { e.stopPropagation(); jumpToBeat(i); };
                menuList.appendChild(item);
            });
        }

        function updateDialogue() {
            const beat = storyBeat[curIdx];
            textEl.style.transition = 'none'; textEl.style.opacity = 0;
            setTimeout(() => { 
                textEl.innerText = beat.text; 
                textEl.style.transition = 'all 0.5s ease-out'; 
                textEl.style.opacity = 1; 
            }, 50);
            document.querySelectorAll('.menu-item').forEach((item, i) => {
                item.style.color = (i === curIdx) ? 'var(--qin-red)' : '#777';
            });
        }

        function nextBeat() {
            if (curIdx < storyBeat.length - 1) { curIdx++; updateDialogue(); } 
            else { document.getElementById('credits-modal').style.display = 'flex'; }
        }

        function closeCredits() { document.getElementById('credits-modal').style.display = 'none'; toggleExit(true); }
        function jumpToBeat(i) { curIdx = i; updateDialogue(); toggleMenu(false); }
        function toggleMenu(s) { document.getElementById('history-menu').classList.toggle('active', s); }
        function toggleExit(s) { document.getElementById('exit-modal').style.display = s ? 'flex' : 'none'; }
        initStory();
    </script>
</body>
</html>
